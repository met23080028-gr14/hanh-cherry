<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hạnh Cherry (@hanh.cherry) • Instagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fafafa; color: #262626; line-height: 1.4;
  }
  a { color: inherit; text-decoration: none; }
  img { display: block; }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: #fff; border-bottom: 1px solid #dbdbdb;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; max-width: 935px; margin: 0 auto;
  }
  .topbar .username { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .topbar .verified { color: #3897f0; font-size: 16px; }
  .topbar .icons { display: flex; gap: 20px; font-size: 22px; }

  .container { max-width: 935px; margin: 0 auto; padding: 0 16px; }

  .profile-header { display: flex; align-items: flex-start; gap: 30px; padding: 30px 0 20px; }
  .avatar-wrap { flex-shrink: 0; }
  .avatar {
    width: 150px; height: 150px; border-radius: 50%;
    object-fit: cover; border: 1px solid #dbdbdb;
    background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf);
  }
  .profile-info { flex: 1; }
  .profile-info .row1 { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
  .profile-info .name { font-size: 20px; font-weight: 400; display: flex; align-items: center; gap: 6px; }
  .profile-info .verified { color: #3897f0; }
  .btn { border: none; border-radius: 8px; padding: 7px 16px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-follow { background: #0095f6; color: #fff; }
  .btn-grey { background: #efefef; color: #262626; }

  .stats { display: flex; gap: 40px; margin-bottom: 20px; font-size: 16px; }
  .stats b { font-weight: 700; }
  .bio { font-size: 14px; }
  .bio .display-name { font-weight: 700; }
  .bio .link { color: #00376b; font-weight: 600; }

  .highlights { display: flex; gap: 30px; padding: 10px 0 25px; overflow-x: auto; }
  .highlight { text-align: center; flex-shrink: 0; cursor: pointer; }
  .highlight .ring { width: 77px; height: 77px; border-radius: 50%; border: 1px solid #c7c7c7; padding: 3px; margin-bottom: 6px; }
  .highlight .ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #efefef; }
  .highlight span { font-size: 12px; }

  .tabs { display: flex; justify-content: center; gap: 60px; border-top: 1px solid #dbdbdb; margin-top: 5px; }
  .tab { display: flex; align-items: center; gap: 6px; padding: 16px 0; font-size: 12px; font-weight: 600; letter-spacing: 1px; color: #8e8e8e; border-top: 1px solid transparent; margin-top: -1px; text-transform: uppercase; }
  .tab.active { color: #262626; border-top: 1px solid #262626; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding-bottom: 40px; }
  .cell { position: relative; aspect-ratio: 1 / 1; cursor: pointer; overflow: hidden; }
  .cell img { width: 100%; height: 100%; object-fit: cover; background: #efefef; display: block; }
  .cell .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; gap: 25px; color: #fff; font-weight: 700; opacity: 0; transition: opacity .15s; }
  .cell:hover .overlay { opacity: 1; }
  .cell .overlay span { display: flex; align-items: center; gap: 7px; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal.open { display: flex; }
  .modal-box { background: #fff; display: flex; max-width: 935px; width: 100%; max-height: 90vh; border-radius: 4px; overflow: hidden; }
  .modal-img { flex: 1.4; background: #000; display: flex; align-items: center; }
  .modal-img img { width: 100%; max-height: 90vh; object-fit: contain; }
  .modal-side { flex: 1; min-width: 320px; display: flex; flex-direction: column; }
  .modal-side .head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #efefef; }
  .modal-side .head img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background:#efefef; }
  .modal-side .head b { font-size: 14px; }
  .modal-comments { flex: 1; overflow-y: auto; padding: 14px 16px; }
  .comment { display: flex; gap: 12px; margin-bottom: 16px; font-size: 14px; }
  .comment .cav { width: 32px; height: 32px; border-radius: 50%; background: #efefef; flex-shrink: 0; }
  .comment b { font-weight: 600; margin-right: 5px; }
  .comment .meta { color: #8e8e8e; font-size: 12px; margin-top: 4px; }
  .modal-actions { padding: 12px 16px; border-top: 1px solid #efefef; }
  .modal-actions .icons { display: flex; gap: 16px; font-size: 24px; margin-bottom: 8px; }
  .modal-actions .likes { font-weight: 600; font-size: 14px; }
  .modal-actions .time { color: #8e8e8e; font-size: 11px; text-transform: uppercase; margin-top: 4px; }
  .modal-close { position: absolute; top: 16px; right: 20px; color: #fff; font-size: 32px; cursor: pointer; z-index: 101; }

  @media (max-width: 735px) {
    .profile-header { padding: 16px 0; gap: 20px; }
    .avatar { width: 86px; height: 86px; }
    .profile-info .row1 { margin-bottom: 12px; }
    .stats { gap: 0; justify-content: space-around; position: fixed; bottom: 0; left: 0; right: 0; background:#fff; border-top:1px solid #dbdbdb; padding: 10px 0; z-index: 40; }
    .stats > div { text-align: center; display: flex; flex-direction: column; }
    .grid { gap: 2px; padding-bottom: 70px; }
    .tabs { gap: 0; justify-content: space-around; }
    .modal-box { flex-direction: column; max-height: 95vh; }
    .modal-side { min-width: 0; }
    .modal-img img { max-height: 50vh; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="username">hanh.cherry <span class="verified">✔</span></div>
    <div class="icons">＋ ☰</div>
  </div>

  <div class="container">
    <div class="profile-header">
      <div class="avatar-wrap">
        <img class="avatar" id="avatar" src="images/avatar.jpg" alt="avatar" onerror="this.style.visibility='hidden'">
      </div>
      <div class="profile-info">
        <div class="row1">
          <div class="name">hanh.cherry <span class="verified">✔</span></div>
          <button class="btn btn-follow" id="followBtn">Theo dõi</button>
          <button class="btn btn-grey">Nhắn tin</button>
        </div>
        <div class="stats">
          <div><b id="postCount">15</b> bài viết</div>
          <div><b id="followerCount">600K</b> người theo dõi</div>
          <div>Đang theo dõi <b>1</b></div>
        </div>
        <div class="bio">
          <div class="display-name">Hạnh Cherry 🍒</div>
          <div>✨ Sống chậm lại, yêu thương nhiều hơn</div>
          <div>📍 Hà Nội</div>
          <div>💌 Liên hệ công việc: hanhcherry@email.com</div>
          <a class="link" href="#">linktr.ee/hanhcherry</a>
        </div>
      </div>
    </div>

    <div class="highlights" id="highlights"></div>

    <div class="tabs">
      <div class="tab active">▦ Bài viết</div>
      <div class="tab">⊞ Reels</div>
      <div class="tab">☖ Được gắn thẻ</div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-close" id="modalClose">×</div>
    <div class="modal-box">
      <div class="modal-img"><img id="modalImg" src="" alt=""></div>
      <div class="modal-side">
        <div class="head">
          <img src="images/avatar.jpg" onerror="this.style.background='#efefef'">
          <b>hanh.cherry</b> <span class="verified" style="color:#3897f0">✔</span>
        </div>
        <div class="modal-comments" id="modalComments"></div>
        <div class="modal-actions">
          <div class="icons">♡ 💬 ➤ <span style="margin-left:auto">🔖</span></div>
          <div class="likes" id="modalLikes"></div>
          <div class="time">2 ngày trước</div>
        </div>
      </div>
    </div>
  </div>

<script>
  /* =======================================================
     CẤU HÌNH — sửa ở đây
     ======================================================= */
  const CONFIG = {
    soBaiDang: 15,            // <<< SỐ ẢNH BÀI ĐĂNG bạn có. Hiện là 15. Nếu thêm ảnh thì đổi số này.
    duongDanAnh: 'images/',          // <<< ĐỂ RỖNG vì ảnh nằm CÙNG thư mục với index.html
    duoiAnh: '.jpg',          // đuôi file ảnh
    likeMin: 18000,
    likeMax: 75000,
    commentMin: 200,
    commentMax: 2500,
  };

  // Highlight: tên file bìa + tiêu đề. Bỏ bớt / thêm dòng tùy ý.
  const HIGHLIGHTS = [
    { tieuDe: 'Du lịch',    anh: 'hl1.jpg' },
    { tieuDe: 'Đời thường', anh: 'hl2.jpg' },
    { tieuDe: 'Ẩm thực',    anh: 'hl3.jpg' },
    { tieuDe: 'Bạn bè',     anh: 'hl4.jpg' },
    { tieuDe: 'OOTD',       anh: 'hl5.jpg' },
  ];

  const COMMENTS = [
    { user: 'mai.linh._', text: 'Xinh quá chị ơi 😍😍' },
    { user: 'tuan.anh2k', text: 'Đỉnh của chóp 🔥' },
    { user: 'hoa.cuctrang', text: 'Cho em hỏi son chị dùng màu gì với ạ?' },
    { user: 'nguyenphuong', text: 'Outfit này đẹp xỉu 🥰' },
    { user: 'beo.map.cute', text: 'Yêu chị nhất quả đất 💕' },
    { user: 'lan.dethuong', text: 'Chụp ở đâu vậy chị, chỉ em với 🙏' },
    { user: 'minh.khoi', text: 'Quá xinh luôn 👏👏' },
    { user: 'thao.nguyen', text: 'Cô gái này là cả bầu trời 🌸' },
  ];

  function randInt(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function formatNumber(n){
    if(n >= 1000) return (n/1000).toFixed(n % 1000 === 0 ? 0 : 1).replace('.0','') + 'N';
    return n.toString();
  }

  const posts = [];
  for(let i=1; i<=CONFIG.soBaiDang; i++){
    posts.push({
      src: CONFIG.duongDanAnh + i + CONFIG.duoiAnh,
      likes: randInt(CONFIG.likeMin, CONFIG.likeMax),
      comments: randInt(CONFIG.commentMin, CONFIG.commentMax),
    });
  }

  const grid = document.getElementById('grid');
  posts.forEach((p, idx) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `
      <img src="${p.src}" alt="bài ${idx+1}" onerror="this.style.opacity='0'">
      <div class="overlay">
        <span>♥ ${formatNumber(p.likes)}</span>
        <span>💬 ${formatNumber(p.comments)}</span>
      </div>`;
    cell.addEventListener('click', () => openModal(p));
    grid.appendChild(cell);
  });

  const highlights = document.getElementById('highlights');
  HIGHLIGHTS.forEach(h => {
    const el = document.createElement('div');
    el.className = 'highlight';
    el.innerHTML = `
      <div class="ring"><img src="${CONFIG.duongDanAnh}${h.anh}" onerror="this.style.visibility='hidden'"></div>
      <span>${h.tieuDe}</span>`;
    highlights.appendChild(el);
  });

  document.getElementById('postCount').textContent = CONFIG.soBaiDang;

  const modal = document.getElementById('modal');
  function openModal(p){
    document.getElementById('modalImg').src = p.src;
    document.getElementById('modalLikes').textContent = p.likes.toLocaleString('vi-VN') + ' lượt thích';
    const box = document.getElementById('modalComments');
    box.innerHTML = '';
    const shuffled = [...COMMENTS].sort(()=>Math.random()-0.5).slice(0, randInt(4,6));
    shuffled.forEach(c => {
      const el = document.createElement('div');
      el.className = 'comment';
      el.innerHTML = `<div class="cav"></div>
        <div><span><b>${c.user}</b>${c.text}</span>
        <div class="meta">${randInt(1,23)} giờ • ${randInt(2,120)} lượt thích • Trả lời</div></div>`;
      box.appendChild(el);
    });
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal(){ modal.classList.remove('open'); document.body.style.overflow=''; }
  document.getElementById('modalClose').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if(e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

  const fb = document.getElementById('followBtn');
  fb.addEventListener('click', () => {
    if(fb.textContent === 'Theo dõi'){ fb.textContent = 'Đang theo dõi'; fb.className = 'btn btn-grey'; }
    else { fb.textContent = 'Theo dõi'; fb.className = 'btn btn-follow'; }
  });
</script>
</body>
</html>
